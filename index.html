<!DOCTYPE html>
<html>
<head>
  <title>For My Puchki 💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      color: white;
    }

    .page {
      display: none;
    }

    .active {
      display: block;
    }

    h1 {
      font-size: 40px;
    }

    p {
      font-size: 20px;
    }

    button {
      padding: 12px 25px;
      margin: 10px;
      font-size: 18px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
    }

    .yes {
      background: #ff4d6d;
      color: white;
    }

    .no {
      background: white;
      color: #ff4d6d;
    }

    .big-love {
      font-size: 30px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <!-- Page 1 -->
  <div id="page1" class="page active">
    <h1>Hello puchki 💖</h1>
    <p>Tap below...</p>
    <button onclick="nextPage()">Next ➡️</button>
  </div>

  <!-- Page 2 -->
  <div id="page2" class="page">
    <h1>Do you love me? 💕</h1>
    <button class="yes" onclick="yesLove()">Yes 💖</button>
    <button class="no" onclick="noLove()">No 🙈</button>

    <div id="result"></div>
  </div>

  <script>
    function nextPage() {
      document.getElementById("page1").classList.remove("active");
      document.getElementById("page2").classList.add("active");
    }

    function yesLove() {
      document.getElementById("result").innerHTML = `
        <p>Give me 1000 kisses 😘😘😘</p>
        <img src="https://i.imgur.com/4M7IWwP.png" width="200">
        <div class="big-love">I LOVE YOU 💖</div>
      `;
    }

    function noLove() {
      document.getElementById("result").innerHTML = `
        <p>No kisses 😢</p>
        <img src="https://i.imgur.com/4M7IWwP.png" width="200">
        <div class="big-love">I Love u Susmita !!!💖</div>
      `;
    }
  </script>

</body>
</html>
