<!DOCTYPE html>
<html>
<head>
  <title>For my Puchki 💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      color: white;
    }

    .page { display: none; }
    .active { display: block; }

    h1 { font-size: 40px; }
    p { font-size: 22px; }

    button {
      padding: 12px 25px;
      margin: 10px;
      font-size: 18px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
    }

    .yes { background: #ff4d6d; color: white; }
    .no { background: white; color: #ff4d6d; }

    .big-love {
      font-size: 32px;
      margin-top: 20px;
    }

    .highlight {
      color: yellow;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <!-- Page 1 -->
  <div id="page1" class="page active">
    <h1>Hello puchki 💖</h1>
    <button onclick="nextPage()">Next ➡️</button>
  </div>

  <!-- Page 2 -->
  <div id="page2" class="page">
    <h1>Do you love me? 💕</h1>
    <button class="yes" onclick="yesLove()">Yes 💖</button>
    <button class="no" onclick="noLove()">No 😏</button>
    <br>
    <button onclick="goBack('page2','page1')">⬅️ Back</button>
  </div>

  <!-- Page 3 -->
  <div id="page3" class="page">
    <div id="result"></div>
    <br>
    <button onclick="goBack('page3','page2')">⬅️ Back</button>
  </div>

  <script>
    function nextPage() {
      document.getElementById("page1").classList.remove("active");
      document.getElementById("page2").classList.add("active");
    }

    function goBack(from, to) {
      document.getElementById(from).classList.remove("active");
      document.getElementById(to).classList.add("active");
    }

    function yesLove() {
      document.getElementById("page2").classList.remove("active");
      document.getElementById("page3").classList.add("active");

      document.getElementById("result").innerHTML = `
        <h1>KISS 😘</h1>
        <p>Kiss only 😘😘😘</p>
        <p class="highlight">b2 ka photo bhejo !!</p>
        <div class="big-love">I LOVE YOU 💖</div>
      `;
    }

    function noLove() {
      document.getElementById("page2").classList.remove("active");
      document.getElementById("page3").classList.add("active");

      document.getElementById("result").innerHTML = `
        <h1>HOW DARE YOU 😡😡😡</h1>
        <p>You pressed NO!! 😤</p>
      `;
    }
  </script>

</body>
</html>
